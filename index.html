<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <img src="./Images/logo.png" alt="Restaurant Mascot Logo" class="brand-logo">
                <h2 class="brand-name">Your Restaurant Menu</h2>
                <p class="brand-slogan">Your Slogan</p>
            </div>
            
            <hr class="divider">

            <div class="nav-section">
                <h3>Quick Links</h3>
                <ul>
                    <li>1. Home</li>
                    <li>2. Your Orders</li>
                    <li>3. Wallet</li>
                    <li>4. Profile</li>
                    <li>5. Logout</li>
                </ul>
            </div>

            <div class="nav-section">
                <h3>More About Us</h3>
                <ul>
                    <li>1. Our blog</li>
                    <li>2. Upcoming Dishes</li>
                    <li>3. Our Story</li>
                    <li>4. Social Media Links</li>
                </ul>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Search Food Item" id="searchInput">
                </div>
                <div class="auth-container">
                    <button class="btn btn-primary">Signup</button>
                    
                    <button class="btn btn-primary">Login</button>
                    <img src="./Images/logo.png" alt="User" class="profile-pic">
                </div>
            </header>

            <section class="banner-section">
                <img src="./Images/image 2.png" alt="Weekend Special Delicious Food Menu" class="promo-banner">
            </section>

            <section class="menu-section">
                <h2>Menu</h2>
                
                <div class="menu-grid" id="menu-container">
                    
                    <div class="menu-card">
                        <img src="placeholder-burger.png" alt="Burger" class="food-img">
                        <div class="card-details">
                            <div class="info">
                                <h4>Burger</h4>
                                <p>$5.99/-</p>
                            </div>
                            <button class="add-btn">+</button>
                        </div>
                    </div>

                    <div class="menu-card">
                        <img src="placeholder-burger.png" alt="Burger" class="food-img">
                        <div class="card-details">
                            <div class="info">
                                <h4>Burger</h4>
                                <p>$5.99/-</p>
                            </div>
                            <button class="add-btn">+</button>
                        </div>
                    </div>

                    <div class="menu-card">
                        <img src="placeholder-burger.png" alt="Burger" class="food-img">
                        <div class="card-details">
                            <div class="info">
                                <h4>Burger</h4>
                                <p>$5.99/-</p>
                            </div>
                            <button class="add-btn">+</button>
                        </div>
                    </div>

                </div>
            </section>
        </main>
    </div>
</body>
</html>
